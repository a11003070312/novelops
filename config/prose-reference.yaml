# ============================================================
# 文笔参考库 + 两稿制流程定义
# 目标：从"不难看"提升到"有质感"
# ============================================================

# ============================================================
# 第一部分：两稿制写作流程
# ============================================================

two_draft_system:

  overview: |
    Phase 2 由 Claude 子代理在纯中文隔离环境中直接生成章节正文。
    两稿制 = 初稿（子代理生成）+ 定稿（主会话修复打磨）。
    核心原则：创作指令越短，文笔越好。
    禁忌清单、文笔规则、数值指标全部不进创作指令——那些是 Phase 3 的事后检查职责。

  draft_1:
    name: "初稿"
    focus: "文学质感优先，自由发挥"
    generator: "Claude 子代理（纯中文隔离环境，极简创作指令）"
    prompt_principle: |
      创作指令只包含两样东西 + 写法三条：
      1. 一句话定调 + 叙事语言的剧情描述 + 角色几句话
      2. 写法要求（只有三条，不能多）：
         a. 像诛仙那样写——句子连贯地流，一段话只做一件事（要么写环境，要么写动作，要么写心情），不要一句话里塞三层意思
         b. "不是X，是Y"句式全章最多用两次
         c. 给读者留呼吸空间——允许角色发呆、沉默、什么都不想地走一段路
      绝不放入：禁用词清单、禁用句式、翻译腔规则、数值指标、文笔样本、硬约束超过3条。
      约束越多文笔越僵。第2章实测验证：12条约束 → 密碎难读；3条约束 → 流畅松弛如诛仙。
      总长度控制在半页以内（300-500字）。
    prompt_anti_patterns: |
      以下做法经实测证明会严重损害文笔，绝不放入创作指令：
      - "设定嵌入行动"（导致每句话塞三层意思）
      - "多层感官"（导致感官描写变成堆砌）
      - "感官跳板过渡"（导致过渡段落做作）
      - "段落不是句子"（子代理会过度合并，反而不自然）
      - 任何数量限制（"最多X处""至少X次"）
      这些规则交给 Phase 3 scan-text.py 事后检查。创作时不要给模型戴枷锁。
    word_count: "2000-2500"

  draft_2:
    name: "定稿"
    focus: "修复禁忌词和现代泄漏，不动文风"
    generator: "Claude 主会话"
    core_principle: |
      定稿的职责是修BUG，不是改风格。初稿的流畅感和松弛感是最重要的资产，必须保护。
      只改三类问题：1.禁忌词 2.现代术语泄漏 3.事实错误。其他不动。
    rules:
      - "禁忌修复：对照 anti-ai-patterns.yaml 检查禁用词和禁用句式，逐个替换"
      - "现代词汇清理：检查现代物件（沙发、手机、电路）和职业术语（程序员、办公室）泄漏"
      - "事实校对：对照 state/facts/ 和角色文件检查设定冲突"
      - "不要做的事：不加感官描写、不合并段落、不深化意象、不润色句子。初稿写成什么样，文风就保持什么样"
    transformation_examples:
      - before: "他很紧张"
        after: "手指无意识地在剑柄上敲了三下"
        principle: "用动作替代形容词"
      - before: "灵力爆发了"
        after: "空气突然变得又干又涩，像大雪前的最后一刻"
        principle: "用环境反应替代直述"
      - before: "他看到了一个很大的坑"
        after: "坑底的阴影吞掉了投下去的碎石——没有回音"
        principle: "用互动替代描述"
      - before: "他决定不动手"
        after: "剑鞘里的剑被按回去了三寸"
        principle: "用细节替代叙述"
      - before: "他赢了但不高兴"
        after: "擂台上安静了两息。陆沉收回手，没看跪在地上的陆青，先看了一眼长老席"
        principle: "用视线和沉默传达复杂情绪"
    deletion_checklist:
      - "删掉所有'他想到'、'他意识到'——直接写他根据这个认知做了什么"
      - "删掉所有'值得一提的是'、'不得不说'类过渡句"
      - "删掉重复传达相同信息的段落（选最好的一段保留）"
      - "删掉读者能自行推断的信息（不要解释为什么2>1）"

# ============================================================
# 第二部分：写作哲学（三条核心原则）
# ============================================================

writing_philosophy:
  overview: |
    只有三条硬性原则。其余全是可选技法。
    好的写作是对场景的直觉反应，不是遵循清单。
    模型根据场景需要自行判断用什么手法。

  principles:
    - name: "自然"
      rule: |
        读出声来通顺就是好句子。别扭就是病句，不管多有意境。
        不硬拗短句，不硬造比喻，不为技巧牺牲可读性。
        诛仙写得好是因为自然，不是因为它在炫技。

    - name: "克制"
      rule: |
        少即是多。能删的都删。
        不替读者做判断，不替角色说心情，不替场景贴标签。
        给画面、给动作、给细节，读者自己会感受。

    - name: "中文原生"
      rule: |
        句子必须像中国人写的，不像翻译过来的。
        主动语态、短句断句、省略是美德、动词驱动。
        详见 writing-style.yaml 的 native_chinese_rules。

# ============================================================
# 第三部分：技法工具箱 + 定稿参考
# ============================================================

technique_toolbox:
  note: |
    以下技法来自诛仙、凡人修仙传等作品。
    它们是工具箱里的工具——场景需要什么就用什么。
    不要求每章都用到所有技法。Phase 3 不检查技法使用率。

  techniques:
    - "以景写情：用环境变化暗示内心状态"
    - "一句定调：用一个精准意象定下场景氛围"
    - "万物有灵：给环境动作和情绪，不当背景板"
    - "克制的力量感：越重要的时刻字越少"
    - "留白：不说完，让读者自己填充"
    - "余韵收束：用环境收束场景，不总结不评论"
    - "身体替代情绪：用身体反应替代情绪形容词"
    - "沉默的力量：不说话比说话更有戏"
    - "水墨质感：留白、渲染、虚实相生"
    - "天地苍茫：天地很大，人很小"

refinement_reference:
  description: "Phase 2.2 定稿时的修复参考"
  transformation_examples:
    - before: "他很紧张"
      after: "手指无意识地在剑柄上敲了三下"
    - before: "灵力爆发了"
      after: "空气突然变得又干又涩，像大雪前的最后一刻"
    - before: "他看到了一个很大的坑"
      after: "坑底的阴影吞掉了投下去的碎石——没有回音"
    - before: "他决定不动手"
      after: "剑鞘里的剑被按回去了三寸"
    - before: "他赢了但不高兴"
      after: "擂台上安静了两息。陆沉收回手，没看跪在地上的陆青，先看了一眼长老席"
  deletion_checklist:
    - "删掉'他想到''他意识到'——直接写行为"
    - "删掉'值得一提的是''不得不说'类过渡句"
    - "删掉重复传达相同信息的段落"
    - "删掉读者能自行推断的信息"

# ============================================================
# 第四部分：场景情绪板模板
# ============================================================

scene_mood_board:
  description: |
    每章写之前先生成情绪板，由人类确认方向后再动笔。
    情绪板必须在纯中文子代理环境中生成（防止主会话英文系统提示污染中文语感）。
    控制在200字以内。用自己的话写，像跟自己说话，不用分析语言。
  template: |
    ## 第XX章 情绪板

    核心画面：（这一章只留一个画面，是哪个？）
    读后感觉：（读完这章，读者心里是什么滋味？一个词。）
    最重要的一句话：（这章最关键的一句台词或叙述。）
    这章靠什么感官抓人：（读者读的时候，身体哪里会有反应？怎么个反应法？）
    情感线要埋什么：（这章要在读者心里种下什么种子？怎么种？）
