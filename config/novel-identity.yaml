# ============================================================
# 小说灵魂定义 - 新书启动 Stage 1 填写
# 定义"写什么感觉"：调性、场景风格、情绪节奏
# ============================================================

# ============================================================
# 第一部分：这本书的"魂"
# ============================================================

identity:

  # 一句话灵魂（这本书的内核是什么）
  soul: ""

  # 核心情绪体验（读者读完应该记住什么感觉）
  core_emotions:
    primary: ""        # 主情绪：读者最强烈的感受
    secondary: ""      # 副情绪：丰富主情绪的第二层
    undercurrent: ""   # 底色：贯穿全书的情绪暗流

  # 本书的标志性元素（区别于同类的独特卖点）
  signature_elements:
    - name: ""
      description: ""
    - name: ""
      description: ""

  # 主题层（渗透在情节中，不需要明写在正文）
  themes:
    - ""
    - ""

  # 世界观质感
  world_texture:
    surface: ""        # 表层：读者直接感知到的世界
    underneath: ""     # 底层：驱动世界运转的真实逻辑
    tone_balance: ""   # 调性比例（例：六分热血两分苍凉两分哲思）

# ============================================================
# 第二部分：场景类型风格指南
# ============================================================

scene_styles:

  # ---- 战斗场景 ----
  combat:
    philosophy: ""
    pacing: |
      [描述战斗节奏。示例：
      动作段落短句急促，心理段落允许放缓。两者交替形成呼吸感。
      关键一击用单独一行，关键一击之前必须有一拍心理停顿。]
    focus: |
      [描述战斗重点。示例：
      1. 心理博弈（占战斗篇幅的五成）
      2. 战前心理（怕不怕、赌不赌）
      3. 误判与修正
      4. 转折瞬间
      5. 战后代价]
    forbidden: |
      - 旁观者逐招解说
      - 双方在战斗中长篇对话
      - 无伤获胜（必须有代价）
      - 纯动作流水账

  # ---- 日常/轻松场景 ----
  slice_of_life:
    philosophy: "日常戏是让读者喜欢角色的时候，不是水字数"
    purpose: |
      每段日常必须至少完成一个目标：
      - 展示角色关系（互动中见真情）
      - 埋设伏笔（看似闲聊中透露关键信息）
      - 制造反差（紧张情节前的最后平静）
    pacing: "节奏放慢但不停滞，对话为主，描写点到为止"
    forbidden: |
      - 纯流水账（没有任何信息量的章节）
      - 超过两章的连续日常（第二章末尾必须引入新冲突）

  # ---- 独角戏场景（仅主角在场） ----
  solo:
    philosophy: "独角戏最容易写闷，必须靠内心声音撑住代入感"
    approach: |
      独角戏的核心问题是没有对话推动节奏。解决方案：
      1. 内心声音高频介入——每300-500字至少1处短句内心独白
      2. 允许自言自语（出声，加引号）
      3. 用内心吐槽/自嘲替代纯叙述
    forbidden: |
      - 连续500字以上的纯第三人称叙述（没有任何内心声音介入）
      - 用纯环境描写填充独角戏的空白
      - 内心独白变成分析说明文

  # ---- 感情/关系场景 ----
  emotional:
    philosophy: "感情戏靠细节不靠台词，靠克制不靠煽情"
    approach: |
      角色不会直接说"我喜欢你"或"我很伤心"。
      感情通过行为传递：行动、沉默、细节。
    intensity_control: |
      感情浓度递进，不能一步到位。
      每个阶段至少跨10-20章，靠事件驱动而非对话驱动。
    forbidden: |
      - 角色突然爱上对方（缺乏铺垫的感情线）
      - 大段内心独白分析自己的感情
      - 强行推进感情线

  # ---- 悬疑/揭秘场景 ----
  mystery:
    philosophy: "最好的悬念是读者觉得自己猜到了，但答案更好"
    structure: |
      三层信息结构：
      1. 表层线索：读者和主角同时发现
      2. 隐藏线索：埋在细节里，回头看才发现
      3. 误导线索：故意指向错误方向
    reveal_pacing: |
      揭露真相不要一次说完。分2-3次：
      第一次：揭开一半，以为搞懂了
      第二次：发现第一次的理解有误
      第三次：完整真相，但引出更大的谜团
    forbidden: |
      - 主角凭空推理出答案（必须有线索支撑）
      - 反派主动解释自己的计划
      - 简单的一次性揭秘

  # ---- 升级/突破场景 ----
  power_up:
    philosophy: "升级是情绪爆发的载体，不是数值变化的播报"
    approach: |
      突破必须和情节绑定：
      - 为了保护某人，逼出潜力
      - 领悟了某个道理，打破心境瓶颈
      - 付出代价换取力量
    pacing: |
      突破前：蓄力阶段，铺垫压力和动机
      突破中：短促有力，不拖泥带水
      突破后：展示新能力，但不长篇描述数值变化
    forbidden: |
      - 打坐冥想就突破了（缺乏戏剧性）
      - 突破后数值播报
      - 每次突破的描写方式雷同

  # ---- 低谷/挫败场景 ----
  setback:
    philosophy: "低谷是为了让读者记住高光，但低谷本身也要有价值"
    approach: |
      失败要有分量：
      - 不是简单的"打不过"，而是认知被颠覆
      - 失去具体的东西（人、物、信念）
      - 主角的反应要符合性格
    duration: |
      低谷不能太长：
      - 轻度挫折：1-2章内反弹
      - 重大打击：3-5章内找到新方向
    forbidden: |
      - 主角长期消沉自我怀疑
      - 挫折没有后续影响

# ============================================================
# 第三部分：情绪节奏模板
# ============================================================

rhythm_patterns:

  # 标准爽文节奏（3-10章一个周期）
  standard_cycle:
    phase_1: "压抑蓄力（1-3章）：遇到挑衅/困境/被低估"
    phase_2: "暗中准备（1-2章）：主角不动声色积蓄力量"
    phase_3: "爆发打脸（1-2章）：公开碾压，旁观者震惊"
    phase_4: "收获奖励（1章）：获得资源/声望/关系推进"
    phase_5: "新的冲突（0.5章）：更强的敌人或更大的谜团出现"

  # 高潮节奏（卷末大决战）
  climax_cycle:
    buildup: "3-5章持续升温，多线交汇"
    peak: "1-2章极限对决"
    aftermath: "1章处理后果，1章留悬念引下一卷"

  # 过渡节奏（卷与卷之间）
  transition_cycle:
    cooldown: "1-2章消化上一卷的结果"
    setup: "1-2章引入新环境、新角色、新目标"
    hook: "第2-3章末尾必须出现新的冲突钩子"
