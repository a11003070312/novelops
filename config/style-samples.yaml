# ============================================================
# 文笔样本库 -- 正面参照（真实作品片段）
# 用途：三稿制每一稿都对照这些片段校准语感
# 来源：公开出版/发表的中文文学作品
#
# 使用方法：
#   写作时不是逐字模仿，而是感受这些段落的"呼吸节奏"，
#   然后用自己的故事内容写出同样的呼吸感。
#
# 来源说明：
#   标注 [网络验证] 的段落来自公开搜索结果中引用的原文
#   标注 [训练记忆] 的段落来自模型训练数据中的记忆，可能非逐字精确
#   标注 [待替换] 的段落建议用户用原书替换为精确原文
# ============================================================

samples:

  # ---- 环境描写（以景写情）----

  - id: "ss-001"
    source: "诛仙 / 萧鼎"
    technique: "以景写情 + 天地苍茫"
    text: |
      [网络验证]
      悠悠晨钟，沉沉暮鼓，须弥山沐浴在缥缈云气之中，
      从初升的旭日到傍晚的残霞，天际风云变幻，
      白云苍狗滚滚而过，时光终究不曾为任何人而停留。

      [网络验证]
      山雨潇潇，天地肃然，
      有谁望见夜色里那一个少年，走进雨中，仰望苍穹！
    why_it_works: |
      两段话的核心手法完全相同：不写人在想什么，只写天地在做什么。
      "白云苍狗滚滚而过"——云在动，时间在走，人站在原地。
      "山雨潇潇，天地肃然"——四个字定调，整个画面的情绪色温就出来了。
      注意句式：四字短句起手（悠悠晨钟/山雨潇潇），然后长句铺开画面，
      最后一句收束落在"人"上。这个"短-长-收"的节奏就是诛仙的呼吸。
    tags: ["环境", "意境", "留白", "节奏"]

  - id: "ss-002"
    source: "诛仙 / 萧鼎"
    technique: "苍茫孤独 + 以景写情"
    text: |
      [网络验证]
      她抬头望天，冰凉的雨滴落在了她脸上，
      那苍穹如墨，漆黑一片。
      ……可是为什么，这世间天地，直到这个时候，
      除了这寂寥的风风雨雨，剩下的，只有漆黑一片呢？

      [网络验证]
      小小年纪，脸上竟是一片坚忍，
      漫天雨丝如刀���剑如霜，
      打湿了他的小小脸庞，有几分憔悴。
    why_it_works: |
      "苍穹如墨，漆黑一片"——八个字把孤独的颜色画出来了。
      "雨丝如刀如剑如霜"——三个"如"字排比递进：刀是锋利，剑是寒冷，
      霜是彻骨。不说"他很痛苦"，让雨替他痛。
      注意"小小年纪"和"小小脸庞"的重复——不是病句，是刻意的节奏回扣，
      用重复制造心疼感。这种重复手法可以学。
    tags: ["环境", "苍茫", "孤独", "以景写情"]

  # ---- 战斗描写（心理博弈）----

  - id: "ss-003"
    source: "凡人修仙传 / 忘语"
    technique: "冷静叙事 + 逻辑推演"
    text: |
      [技法指令 -- 你读过《凡人修仙传》，按以下DNA来写战斗]

      忘语的战斗叙事DNA（四种核心句式）：
      1. 身体判断句："心中一沉""心中一凛""面色微变"
         ——不写"他觉得情况不妙"，用一个身体反应词代替全部心理描写
      2. 否定推演句："看来不使用XX是不行了"
         ——否定句式暗示被逼到了哪一步，比"他决定用XX"有压迫感
      3. 权衡决断句："还是先下手为强算了"
         ——"算了"两个字带出犹豫后的决断，比"他决定"生动
      4. 资源算账句："若不是觉得对新法器还不太熟悉……"
         ——角色永远在算：灵力够不够、符箓剩几张、对方可能有什么底牌

      战斗推进的逻辑链（必须完整）：
      试探 -> 判断实力差距 -> 权衡资源 -> 调整策略 -> 布局 -> 释放杀招
      每一步都要有"因为A所以B，但B有风险C，所以选D"的因果链
    why_it_works: |
      忘语的战斗没有华丽辞藻。他的力量来自逻辑的说服力——
      读者不是被文字震撼，是被"他想得对"说服。
      韩立的每个决策都有原因，每个原因都指向一个结果。
      这种"因为A所以B，但B有风险C，所以选D"的链条就是战斗的骨架。
      对本书的启示：陆沉的战斗心理链应该模仿这个结构。
    tags: ["战斗", "心理", "逻辑", "资源博弈"]

  # ---- 安静场景（留白与省略）----

  - id: "ss-004"
    source: "诛仙 / 萧鼎"
    technique: "克制的力量感"
    text: |
      [网络验证] 痴情咒：
      九幽阴灵，诸天神魔，以我血躯，奉为牺牲。
      三生七世，永堕阎罗，只为情故，虽死不悔。

      [训练记忆 -- 碧瑶挡剑场景的笔法特征]
      碧瑶挡在诛仙剑下的那一刻，萧鼎没有写大段的心理描写，
      没有写张小凡的震惊，没有写旁观者的反应。
      只写了动作：她挡在那里。然后倒下了。
      所有的悲痛留给读者自己去感受——这就是"克制的力量感"。
      越重要的时刻，字越少。碧瑶死的那一段，可能是全书最短的高潮。
    why_it_works: |
      痴情咒本身是四字排比，节奏像鼓点一样整齐。
      但这首咒最狠的地方是最后四个字："虽死不悔。"
      前面铺了那么多——九幽、诸天、血躯、三生七世——
      全是宏大的词，最后落在"不悔"两个最朴素的字上。
      大词铺底，小词收尾。这个节奏可以直接用在战斗转折点。
    tags: ["克制", "高潮", "短句", "节奏"]

  - id: "ss-005"
    source: "赤心巡天 / 情何以甚"
    technique: "日常中的锐度"
    text: |
      [网络验证]
      他曾是棋盘上的子，铁钩上的饵……
      如今他已是棋盘外，傲立绝巅之林。
      天下一局棋，没人可以用他为子。
      人世一片海，他也是垂钓者。

      [技法指令 -- 你读过《赤心巡天》，按以下特征写日常戏]
      情何以甚的日常戏DNA：
      1. 零废话原则：每句看似闲聊的台词都携带信息（试探/暗示/立场表态）
      2. 延迟揭示：读者读完对话才发现——刚才那句玩笑话其实是在试探
      3. 轻盈感：信息密度高但读起来不累，靠短句和口语化实现
    why_it_works: |
      "棋盘上的子，铁钩上的饵"——两个比喻不重复，
      一个写被操控（棋），一个写被牺牲（饵），从两个角度压缩"弱者"的处境。
      然后反转："棋盘外""垂钓者"——用同一套意象系统完成翻转。
      对本书的启示：比喻要成系统，不要东一个西一个。
    tags: ["日常", "信息密度", "比喻系统"]

  # ---- 对话场景（自然差异化）----

  - id: "ss-006"
    source: "诛仙 / 萧鼎"
    technique: "对话即性格 + 沉默的力量"
    text: |
      [训练记忆 -- 诛仙中的对话风格特征]
      诛仙的对话差异化不靠"XX地说"标签，靠三个手段：
      1. 句长差异——道玄说话长且工整（掌教的威严），
         张小凡说话短且断续（少年的笨拙和痛苦），
         碧瑶说话带刺但有温度（鬼王之女的骄傲和柔软）
      2. 用词层次——正道长辈用四字成语、文言措辞；
         草庙村出身的小凡用大白话；
         魔教中人用更直接甚至粗鲁的表达
      3. 沉默——诛仙里最有力的"对话"往往是不说话。
         张小凡在很多关键时刻的反应是沉默，
         萧鼎用"他没有说话"或者直接写下一个动作来表达

      [技法指令 -- 你读过《诛仙》，回忆道玄审判张小凡时的对话，按以下规则写]
      对话差异化的执行规则（不靠标签，靠句式本身）：
      - 权威角色：四字短语多、句式工整、偶用文言（"此事……不可"）
      - 少年/底层角色：大白话、短句、断续、"我……""可是……"
      - 骄傲角色：句子完整但带刺、反问多、不解释自己
      - 沉默 = 最有力的台词：关键时刻不写角色说什么，写"他没有说话"或直接接下一个动作
    why_it_works: |
      好的对话差异化，读者遮住说话人的名字也能猜出是谁在说。
      萧鼎做到了这一点。同样一个场景里，
      三个人的台词风格完全不同，不需要任何标签提示。
      对本书的启示：陆沉话少、短句、不废话；
      陆伯远说话有分量、偶尔意味深长；
      陆青说话带火气、不稳定。靠句式本身区分。
    tags: ["对话", "性格", "沉默", "差异化"]

  # ---- 内心独白（克制的情绪）----

  - id: "ss-007"
    source: "诛仙 / 萧鼎"
    technique: "内心声音 + 环境呼应"
    text: |
      [训练记忆 -- 张小凡内心戏的笔法特征]
      萧鼎写张小凡的痛苦从来不用"他很痛苦"。他用三种方法：
      1. 环境替他说——他难过的时候写雨、写风、写天黑了
      2. 动作替他说——他坐在那里不动，或者走路的时候突然停下来
      3. 别人替他说——旁人看见他的表情，读者通过旁人的反应推断他的状态

      最典型的模式：
      一段环境描写（天色/天气/山景）
      + 一个很小的动作（低头/站住/手停了一下）
      + 然后什么都不写了。
      读者自己补完那个"他在想什么"。

      [网络验证]
      "山雨潇潇，天地肃然，有谁望见夜色里那一个少年，
      走进雨中，仰望苍穹！"
      ——山雨是环境，走进雨中是动作，仰望苍穹是留白。
      他在想什么？萧鼎不说。但每个读者都知道。
    why_it_works: |
      "留白"不是偷懒，是信任读者的智商。
      当你把情绪写得越明确，读者感受到的反而越少——因为他没有参与。
      当你只给画面和动作，让读者自己去填那个情绪，
      他填出来的东西比你写出来的更有力。
      对本书的启示：陆沉想女儿的时候，不要写"他想起了女儿"，
      写他看见了一个什么东西（和女儿有关的细节），然后移开了目光。
    tags: ["内心", "克制", "情绪", "留白"]

  # ---- 章末收束（余韵）----

  - id: "ss-008"
    source: "诛仙 / 萧鼎（综合多处章末）"
    technique: "画面定格收尾"
    text: |
      [训练记忆 -- 诛仙章末收束的通用模式]
      萧鼎的章末有一个非常稳定的模式：
      最后一段不写人的反应，写天地的状态。

      常见收束句式：
      - 风起了。/ 风停了。（最简一字收束）
      - 天色暗下来了。（时间收束）
      - 远处的山/云/雨有了某种变化。（空间收束）
      - 一个很小的声音（水滴、虫鸣、风声）。（感官收束）

      核心手法：人的故事讲完了，但天地还在。
      用天地的持续来衬托人事的短暂。
      章末不总结、不评论、不预告。画面定格在一个自然景象上，收。

      [技法指令 -- 你读过《诛仙》，回忆那些章末收束，按以下模式写章末]
      四种收束模板（章末最后1-2句必须是以下之一）：
      - 风声收束："风起了。"/"山风呜咽。"（最简，一句定格）
      - 时间收束："天色暗下来了。"/"月亮升到了头顶。"
      - 空间收束："远处的山脊上，云散了。"（把镜头拉远）
      - 感官收束：一个很小的声音（水滴、虫鸣、叶落）结束全章
      绝对禁止：章末写角色的想法、总结、预告下一步行动
    why_it_works: |
      人走了，风还在吹——这就是余韵。
      如果章末写"他心里想着，这件事还没有结束"，余韵就死了。
      如果章末写"远处的山顶上，云散了"，读者合上书还在想。
      对本书的启示：每章最后1-2句必须是环境，不是角色的想法或总结。
    tags: ["收束", "余韵", "留白", "环境"]

# ============================================================
# 补充样本：中文原生语感锚点（针对翻译腔问题）
# ============================================================

  - id: "ss-009"
    source: "综合 / 中文原生语感示范"
    technique: "意合叙事 vs 形合叙事（翻译腔对照）"
    text: |
      翻译腔：他意识到这个间隔是固定的，这意味着存在某种规律。
      中文：七息。又是七息。错不了。

      翻译腔：搞不清楚的事先不管。七息是确定的。
      中文：别的都不想了。就这个：七息。

      翻译腔：这是他睁开眼看到的第一样东西。
      中文：（删掉。直接写他看到了什么。）

      翻译腔：他感到一阵强烈的好奇心涌上心头。
      中文：（删掉。写他做了什么——他多看了两眼。）

      翻译腔：一股前所未有的力量从他体内爆发出来。
      中文：身体里有什么东西炸开了。

      翻译腔：他不知道为什么，但他就是觉得这很重要。
      中文：说不上来。但这个东西不能丢。

      翻译腔：空气中弥漫着一种紧张的氛围。
      中文：（删掉。写具体的：没人说话。虫子也不叫了。）

      翻译腔：他的眼神中充满了复杂的情感。
      中文：他看了她一眼。没看第二眼。
    why_it_works: |
      翻译腔的核心问题：用结构标记逻辑（"意味着""这是""确定的"）。
      中文的做法：让读者自己从内容推出逻辑。
      你不需要说"这是规律"——连续写两次"七息"，读者自己知道是规律。
      你不需要说"他很好奇"——写他"多看了两眼"，读者自己知道他好奇。
      原则：删掉所有"框架句"（这是X、X是Y的、他意识到、这意味着），
      只留内容本身。中文读者不需要路标，他们跟得上。
    tags: ["翻译腔", "对照", "语感", "核心"]

  - id: "ss-010"
    source: "综合 / 中文动词驱动叙事示范"
    technique: "动词链叙事（省略一切可以省略的）"
    text: |
      翻译腔版本：
      陆沉在嘴里把这句话嚼了一遍。
      他的大脑从一堆混乱的信息碎片中抓住了一个关键的锚点。
      那些搞不清楚的事情可以暂时先放在一边不管。
      七息这个数字是确定的。
      有了这个确定的信息就足够了。

      中文版本：
      七息。又是七息。
      别的不想了。就记住这个。

      差异分析：
      - 翻译腔用60字说了一件事，中文用14字
      - 翻译腔有5个主谓结构，中文有0个完整主谓结构
      - 翻译腔的每句话都在"解释"，中文的每句话都在"做"
      - "别的不想了"——省略了主语、省略了"什么别的"、
        省略了"为什么不想"。中文读者不需要这些。
    why_it_works: |
      中文叙事的力量来自省略。
      省掉主语：读者知道是谁。
      省掉因果：读者能推出来。
      省掉形容：动词本身有画面。
      "嚼了一遍"可以留（这个动词有质感），
      但后面的"大脑从碎片中抓住锚点"是英语思维的隐喻链，必须砍掉。
    tags: ["翻译腔", "省略", "动词", "核心"]

# ============================================================
# 补充样本：JOJO式战斗推理（规则对抗层）
# ============================================================

  - id: "ss-011"
    source: "JOJO的奇妙冒险 / 荒木飞吕彦"
    technique: "规则推理战斗（能力解谜 + 信息差博弈）"
    text: |
      [技法指令 -- 你知道JOJO的替身战，按以下结构写道痕战斗]

      JOJO式战斗的三层结构（本书道痕战斗必须完整包含）：

      第一层：规则发现
      - 角色遭遇未知道痕 -> 受到不合常理的攻击 -> 第一反应不是反击，是观察
      - 关键句式："不对。""等等。""刚才那一下……"
      - 角色开始收集线索：攻击的触发条件、生效范围、持续时间
      - 每次试探都有代价（受伤、消耗资源），不能免费获取信息

      第二层：规则推理
      - 角色根据线索推导对方能力的规则（类似解谜）
      - 推理过程要展示给读者：假设A -> 验证 -> 排除 -> 假设B -> 验证 -> 锁定
      - 允许推理错误（第一个假设往往是错的，制造反转）
      - 关键句式："如果是这样的话……""不，还有一种可能。""原来如此。"

      第三层：规则破解
      - 找到对方规则的盲点/限制条件 -> 设计针对性破解方案
      - 破解方案必须利用己方能力的特性去克制对方规则的弱点
      - 最佳效果：读者事后回看，所有线索都在前文出现过，但组合方式出人意料
      - 关键句式：不说"我想到了"，而是直接行动——读者从行动中反推角色想通了什么

      JOJO战斗的节奏模板：
      被动挨打（读者紧张）-> 观察收集线索（读者好奇）->
      推理出规则（读者恍然）-> 第一次反击失败/部分成功（读者再次紧张）->
      修正方案 -> 最终破解（读者爽）

      与凡人修仙传的叠加方式：
      - 凡人的"算账"提供战斗的资源压力（灵力不够、符箓有限、身体受伤）
      - JOJO的"解谜"提供战斗的智力快感（规则推理、信息差利用）
      - 两者叠加 = 资源有限的情况下解谜，解谜的每一步都有代价
    why_it_works: |
      JOJO战斗好看不是因为能力炫酷，是因为它把战斗变成了智力游戏。
      读者的爽感来自"我跟着角色一起推理"和"原来答案就在眼前"。
      本书道痕体系天然适合这个结构——每个道痕都有明确规则和限制，
      战斗就是在有限信息下推理对方规则并找到破绽的过程。
    tags: ["战斗", "JOJO", "规则推理", "解谜", "信息差"]

