# ============================================================
# 番茄小说平台写作规则 - 通用
# 根据番茄小说算法机制和爆款分析总结的写作规范
# ============================================================

platform: "番茄小说"
algorithm_driven: true                   # 算法推荐，完读率和留存率决定流量

# ============================================================
# 一、黄金开篇规则（前三章定生死）
# ============================================================
opening_rules:
  first_paragraph:
    rule: "第一段必须出现冲突或悬念，禁止铺垫式开场"
    examples:
      good:
        - "被退婚、被当众羞辱"
        - "末日降临、被卷入致命危机"
        - "发现惊天秘密"
      bad:
        - "描写天气和环境"
        - "介绍世界观背景"
        - "主角日常生活流水账"

  first_chapter:
    rule: "第一章必须包含：极致冲突 + 金手指初现 + 一个钩子"
    word_count: [1200, 1800]

  first_three_chapters:
    rule: "前三章必须完成：建立压抑 -> 亮出金手指 -> 第一次小爽点"
    checklist:
      - "读者能代入主角"
      - "核心设定已展示"
      - "金手指已激活"
      - "至少一个让读者想继续看的悬念"

# ============================================================
# 二、节奏模型
# ============================================================
rhythm:

  # 微观节奏 - 单章
  micro:
    chapter_word_count: [2000, 2500]    # 番茄平台甜区，权威来源为 config/project.yaml
    rules:
      - "每章必须有一个小高潮或关键信息点"
      - "章末必须留悬念（卡文），逼读者点下一章"
      - "禁止一章内没有任何进展的纯过渡章"
    cliffhanger_types:
      - "新威胁出现"
      - "关键信息揭露一半"
      - "角色做出意外决定"
      - "反转（刚建立的认知被打破）"
      - "危机降临（战斗中局势逆转）"

  # 中观节奏 - 剧情小周期（3-10章）
  meso:
    standard_cycle:
      description: "多巴胺循环，密集重复"
      phases:
        - name: "压抑蓄力"
          chapters: "1-3章"
          content: "遇到挑衅/困境/被低估"
        - name: "暗中积蓄"
          chapters: "1-2章"
          content: "主角不动声色准备"
        - name: "爆发打脸"
          chapters: "1-2章"
          content: "公开碾压，旁观者震惊"
        - name: "收获奖励"
          chapters: "1章"
          content: "获得资源/声望/关系推进"
        - name: "新冲突引入"
          chapters: "0.5章"
          content: "更强的敌人或更大的谜团"

  # 宏观节奏 - 全书
  macro:
    rule: "需要一个极其宏大且遥远的终极目标支撑百万字连载"
    structure:
      - "每卷有独立的小目标，同时推进主线"
      - "卷末必须有大高潮 + 通往下一卷的钩子"
      - "整体节奏: 螺旋上升，每次低谷都比上次更高"

# ============================================================
# 三、情绪驱动规则
# ============================================================
emotion_driver:

  core_principle: "欲扬先抑，压得越狠弹得越高，爽感越强"

  suppression_rules:
    - "压抑必须具体、可感：不是抽象的不公，而是具体的被打、被嘲笑、被抢走"
    - "压抑阶段让读者憋屈到想替主角动手"
    - "压抑来源必须明确（具体的人、具体的事），方便后续打脸"

  release_rules:
    - "爽感释放要干脆利落，不拖泥带水"
    - "打脸必须公开、当众，有足够多的旁观者震惊"
    - "打脸后给读者喘息的时间（1章收获期）"

  forbidden:
    - "压抑超过半卷没有任何释放（读者会弃书）"
    - "打脸力度不够（敌人太弱，赢得太轻松）"
    - "打脸没有观众（没人见证就没爽感）"

# ============================================================
# 四、核心卖点维护
# ============================================================
selling_points:

  instant_gratification:
    rule: "即时满足感是核心。注意：本书核心卖点是'所有角色智商在线'（见project.yaml），反派不降智——爽感来自主角的情报优势和精准判断，而非对手犯蠢"
    guidelines:
      - "主角必须有后手，逢赌必赢（但过程要有波折）"
      - "不要让读者等太久才看到回报"
      - "小爽点密集分布，大爽点卷末集中爆发"

  brain_hole:
    rule: "设定本身要足够新奇，让人想看怎么圆"
    guidelines:
      - "开篇就展示最吸引人的设定"
      - "设定要不断深入展开，不能开局就见底"

  substitution:
    rule: "主角必须容易代入，起点越低越好"
    guidelines:
      - "主角初始设定为普通人、废物、边缘人"
      - "金手指给主角，但不直接给答案"
      - "主角靠自己的判断和金手指配合才能赢"

  anticipation:
    rule: "持续画饼，制造期待"
    guidelines:
      - "新武器、新能力、新秘密不断预告"
      - "终极目标遥远但清晰"
      - "每次揭露一层，后面还有更深的层"

# ============================================================
# 五、禁忌
# ============================================================
platform_forbidden:
  - "慢热开场（前三章没有冲突）"
  - "大段设定说明（世界观要融入剧情中展示）"
  - "连续两章以上没有任何冲突或悬念"
  - "主角长期弱势没有任何反击（超过10章）"
  - "解释性独白超过300字"
  - "同一个反派拖太久不解决（一个小反派最多撑一卷）"
  - "无意义的日常描写超过半章"
  - "跳出故事的元叙事（作者视角评论）"
