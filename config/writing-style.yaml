# ============================================================
# 写作技法定义 - 新书启动 Stage 1 填写
# 定义"怎么写"：视角、句式、语言特征
# ============================================================

# 叙事视角
pov: "第三人称限知"                           # 第三人称限知 / 第一人称
pov_character: "[主角名]"                     # 视角跟随的角色
pov_switch_allowed: false                    # 是否允许切换视角

# 文风基调
tone: ""                                     # 描述整体文风（参考：凝重/轻快/苍茫/热血/悬疑 等）
humor_level: "低"                            # 低/中/高
darkness_level: "中"                         # 低/中/高（世界的残酷程度）
seriousness: "高"                            # 低/中/高（正剧感）

# 语言特征
sentence_style: |
  [描述句式风格。示例：
  长短交错，以节奏驭情绪。意境段落用较长句铺陈画面；
  转折和冲击用极短句落锤，一字成段。
  日常场景疏淡从容，战斗场景短促凌厉。]

vocabulary_level: |
  [描述用词风格。示例：
  偏古雅，带水墨质感。用字讲究，修仙术语自然融入语境。
  避免现代网络用语。]

dialog_style: |
  [描述对话风格。示例：
  简洁有力。每个角色有独立的语言标记和说话节奏，对话差异化是硬性要求。]

description_style: |
  [描述环境/战斗描写风格。示例：
  环境描写追求画面感和留白意境。战斗描写过程清晰、逻辑严密、动作写关键帧。]

inner_monologue: |
  [描述内心独白风格。示例：
  主角内心声音是叙事的一部分：
  - 语气：务实、直接，符合人物职业背景。不煽情、不感慨人生。
  - 不加引号的短句直接插入叙事："得起来。""真行。""别想了。"
  - 不写大段内心分析。分析结果用行为展示。]

# 叙事偏好
narration_preferences:
  action_scenes: |
    [描述战斗/动作场景的写法偏好。]
  quiet_scenes: |
    [描述日常/过渡场景的写法偏好。]
  exposition: |
    [描述信息传递的方式。示例：严禁大段说明，设定融入角色对话和行动中自然带出。]

# 禁忌清单（本书特有的，通用禁忌在 anti-ai-patterns.yaml）
forbidden:
  - "[根据本书设定填写特有的写作禁忌]"
  - "[例：特定概念的禁用词，与世界观相关的错误逻辑等]"

# ============================================================
# 中文原生语感规则（通用，一般不需要修改）
# ============================================================
native_chinese_rules:
  philosophy: |
    中文是意合语言（靠语义推动逻辑），不是形合语言（靠连接词标记逻辑）。
    英文 "Although A, B however C" 对应的中文不是 "尽管A，B然而C"，
    而是 "A。但B。C。" -- 读者自己能推出因果和转折。

  rules:
    - name: "主动为王"
      principle: "中文默认主动语态。'被'字在古汉语中暗示遭殃，现代用法也应克制"
      bad: "他被一股强大的力量推了出去"
      good: "一股力量把他推了出去"
      alt_good: "那力量来得太猛，他整个人飞了出去"

    - name: "短句断句"
      principle: "中文天然适合短句。长句不靠连接词串联，而是靠句号断开后的语义呼应"
      bad: "由于灵气浓度过高，导致经脉承压增大，因此他不得不放慢修炼速度"
      good: "灵气太浓了。经脉撑得发胀。他放慢了速度"

    - name: "省略是美德"
      principle: "中文允许大量省略--主语、连词、因果关系都可以省。省得越多，读着越快"
      bad: "他看到了那个人，然后他决定跟上去，因为他觉得那个人很可疑"
      good: "他看见那个人了。可疑。跟上去"

    - name: "动词驱动"
      principle: "中文用动词推进叙事，不用名词化。不说'进行修炼'，说'修炼'"
      bad: "他对这个问题进行了深入的思考"
      good: "他想了很久"

    - name: "排比要递进"
      principle: "中文排比追求意义上的层层递进，不是形式上的简洁对称"
      bad: "有光就有影，有影就有暗，有暗就有机会"
      good: "光底下藏着影子，影子里头裹着暗，暗处的东西谁也看不见--他要的就是这个"

    - name: "比喻不翻译"
      principle: |
        英语隐喻不能直接搬进中文。字面全是中文但比喻逻辑来自英语 = 翻译腔。
        自检：一个从未接触英语的古人，会这样比喻吗？不会就换掉。
      bad: "有规律就有缝"
      bad_reason: "缝(crack)比喻弱点是英语映射"
      good: "有规律就有破绽"
      common_traps:
        - english: "crack/gap -> vulnerability"
          chinese: "破绽、空子、漏洞"
        - english: "window -> opportunity"
          chinese: "时机、空档"
        - english: "fuel -> motivation"
          chinese: "直接写驱动行为，不名词化"
        - english: "roadmap -> plan"
          chinese: "盘算、计较、有数"
        - english: "trigger -> cause"
          chinese: "引子、由头"

# 参考标杆（按文笔权重排序）
reference_works:
  - title: "诛仙"
    aspect: "文笔的第一参考。意境感、环境描写的水墨画面感、以景写情、克制中的力量感"
    weight: "最高"
  - title: "[填写其他参考作品]"
    aspect: "[参考哪个方面]"
    weight: "高/中"

# 章节结构偏好
chapter_structure:
  opening: "直接切入场景或对话，禁止概述式开头"
  ending: "必须留悬念或反转，禁止平淡收尾"
  pacing: "每章至少一个小高潮或信息揭露"
  title_naming: "[描述章节标题风格。示例：至少四个字，追求文学性，略带悬念或意象感。]"
