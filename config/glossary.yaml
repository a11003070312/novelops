# ============================================================
# 术语表 - 错别字/形近字自动拦截
#
# scan-text.py 会扫描正文，命中 wrong 列表中的写法即 FAIL。
# 每次发现新的错别字后追加到此文件。
#
# 格式:
#   - correct: "正确写法"
#     wrong: ["错误写法1", "错误写法2"]
#     note: "说明"
#
# 以下为修仙题材通用示例，根据你的世界观设定增删。
# ============================================================

terms:
  # ---- 修仙通用术语 ----
  - correct: "炼气"
    wrong: ["练气"]
    note: "炼（火字旁）= 炼化，修仙标准用字"

  - correct: "筑基"
    wrong: ["铸基", "驻基", "住基"]
    note: "筑 = 构筑根基"

  - correct: "丹田"
    wrong: ["单田"]
    note: "丹 = 炼丹之处"

  - correct: "灵脉"
    wrong: ["灵脈"]
    note: "简体标准字"

  - correct: "经脉"
    wrong: ["经脈"]
    note: "简体标准字"

  - correct: "吐纳"
    wrong: ["吐呐"]
    note: "纳 = 吸纳"

  - correct: "淬体"
    wrong: ["萃体", "粹体"]
    note: "淬 = 淬炼身体"

  - correct: "灵石"
    wrong: ["灵时"]
    note: "石头的石"

  - correct: "法器"
    wrong: ["法气"]
    note: "器物的器"

  - correct: "打颤"
    wrong: ["打战"]
    note: "颤抖，不是打仗"

  # ---- 在此添加你的世界观专有术语 ----
  # - correct: "你的术语"
  #   wrong: ["常见错误写法"]
  #   note: "说明"
