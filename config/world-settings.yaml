# ============================================================
# 世界观设定 - 新书启动 Stage 1 填写
# ============================================================

# 世界类型
world_type: ""          # 修仙/都市/末世/西幻/古言/星际/等
time_period: ""         # 架空古代/现代/未来/等

# ============================================================
# 力量体系
# （建议抽出为独立文件 config/power-system.yaml，此处保留骨架）
# ============================================================
power_system:

  name: ""              # 力量体系的名称（如：修仙境界/超能力/魔法/等）
  core_logic: ""        # 一句话解释力量体系的底层逻辑

  levels:               # 境界/等级列表（由低到高）
    - name: ""
      description: ""
    - name: ""
      description: ""

  special_mechanics:    # 特殊机制（金手指、觉醒、道痕等）
    - name: ""
      description: ""
      rules: []

# ============================================================
# 地理设定
# ============================================================
geography:

  overview: |
    [描述世界的整体地理格局。]

  locations:
    - name: ""
      type: ""          # 核心区域/边境/危险地带/等
      description: ""
      key_features: ""
      narrative_role: ""  # 第几卷的主场景，对故事的作用

# ============================================================
# 组织/势力
# ============================================================
factions:

  - name: ""
    type: ""            # 宗门/家族/国家/组织/等
    power_level: ""
    leader: ""
    stance: ""          # 正道/魔道/中立/不明
    relationship_to_protagonist: ""
    special: ""         # 特殊能力/信息/资源

# ============================================================
# 世界规则
# ============================================================
world_rules:
  - "[填写世界观规则。这些规则会被 check-consistency.py 用于一致性校验]"
  - "[例：货币体系、寿元规则、飞行条件、禁区规则等]"

# ============================================================
# 历史/背景事件
# ============================================================
history:
  - event: ""
    description: ""
    impact_on_story: ""

# ============================================================
# 命名规范
# ============================================================
naming_conventions:

  general_rule: |
    [描述整体命名风格。示例：名字的考究程度跟着物件品质走。
    小家族的低阶东西叫得朴素，大宗门的高阶传承叫得庄重。]

  categories:
    - type: ""          # 法术/技能/道具/组织/等
      style: ""
      examples: []
      forbidden: []
