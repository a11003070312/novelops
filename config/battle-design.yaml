# ============================================================
# 战斗设计工作坊 - 重要战斗的前置创意发散流程
# 目标：避免"第一直觉"方案，追求JOJO式的意外感
# 触发条件：章节大纲中标记有重要战斗的章节
# ============================================================

# 什么算"重要战斗"
trigger_criteria:
  - "[首次展示主角核心能力/金手指的战斗]"
  - "[跨阶击败/逆转的战斗]"
  - "[卷高潮战斗]"
  - "[推动主角认知升级的战斗]"
  - "[涉及信息战博弈的战斗]"
  # 日常小战斗不需要走此流程，在新书启动 Stage 1 根据世界观填写具体触发条件

# ============================================================
# 五步设计法
# ============================================================

workshop_steps:

  step_1_inventory:
    name: "能力清单"
    description: |
      列出双方的完整能力矩阵：
      - 道痕规则（五要素：触发、效果、范围、代价、桎梏）
      - 法术/法器列表及当前灵力能支撑几次使用
      - 地形条件（有利点、不利点、可利用的环境要素）
      - 信息差（各方对对手了解到什么程度？无知/类型已知/表象已知/规则已知/完全已知）
      - 身体状态（伤势、灵力余量、精神状态）
      - 非战斗资源（灵石、丹药、逃遁手段）

  step_2_diverge:
    name: "方案发散"
    description: |
      根据能力清单，生成至少5种胜负方案。必须满足：
      - 至少1种"正面硬刚"方案（最直觉的）
      - 至少1种"信息战"方案（利用对手不知道的信息）
      - 至少1种"环境利用"方案（地形、天气、第三方）
      - 至少1种"规则边界"方案（利用道痕桎梏或边界条件的创造性应用）
      - 至少1种"反直觉"方案（主动示弱、故意暴露破绽、利用自身弱点）
    output_format: |
      | # | 方案名 | 核心思路 | 意外度(1-5) | 逻辑自洽度(1-5) |
      |---|--------|---------|------------|----------------|

  step_3_eliminate:
    name: "淘汰显而易见"
    description: |
      将方案按"意外度"排序，强制排除：
      - 意外度最低的方案（读者一眼看穿的）
      - 纯靠"突然变强"的方案（没有铺垫的金手指）
      - 与主角人设不符的方案（陆沉不会热血蛮干）

  step_4_select:
    name: "选择最佳方案"
    description: |
      从剩余方案中选出"逻辑自洽度最高的意外方案"。
      黄金标准：
      - 读者看到结果时第一反应是"不可能！"
      - 回头看伏笔时第二反应是"原来如此..."
      - 方案的每一步都能在前文找到铺垫依据
    human_collaboration: |
      将筛选后的2-3个方案摘要呈现给人类，由人类选择方向。
      人类可能会给出全新的疯狂点子——这正是最有价值的输入。

  step_5_reveal_design:
    name: "信息揭示设计"
    description: |
      确定方案后，倒推最佳信息揭示顺序：
      - 读者先"看到"什么？（制造错误预期）
      - 转折点在哪一刻？（最大化意外感）
      - 真相揭示后需要回扣哪些前文细节？（确保不是asspull）
      - POV控制：哪些信息通过主角视角展示，哪些通过对手反应暗示
    output_format: |
      揭示时间线：
      1. 读者以为 -> [错误预期A]
      2. 转折信号 -> [某个细节暗示情况不对]
      3. 真相揭示 -> [方案D的实际情况]
      4. 回扣前文 -> [第X章第Y段已经铺垫过]

# ============================================================
# 道痕战斗的特殊规则
# ============================================================

dao_mark_battle_rules:
  core_principle: "每场道痕战斗本质上是一场推理游戏"

  information_levels:
    - level: 0
      name: "无知"
      description: "不知道对手有道痕"
      narrative_value: "最大悬念，但只能用一次"
    - level: 1
      name: "类型已知"
      description: "知道对手道痕的大类（物理/概念/因果等）"
      narrative_value: "缩小猜测范围，仍有大量未知"
    - level: 2
      name: "表象已知"
      description: "见过效果，但不知道触发条件和桎梏"
      narrative_value: "读者和角色一起推理规则"
    - level: 3
      name: "规则已知"
      description: "知道完整规则，包括桎梏"
      narrative_value: "战斗重心转向如何利用已知规则"
    - level: 4
      name: "完全已知"
      description: "知道一切，包括对手对自己的了解程度"
      narrative_value: "最高级博弈——元信息战"

  edge_case_creativity: |
    道痕战斗最精彩的瞬间来自"规则边界的创造性利用"：
    - 桎梏反用：把限制条件变成战术优势
      例："只能锁定可观测事物"-> 故意让对手"看到"假目标
    - 环境共振：道痕效果与环境条件产生意外组合
      例：在水面上使用锁定位置 -> 水面变成不可穿透的硬面
    - 代价转嫁：把道痕的代价用某种方式转移或抵消
    - 桎梏欺骗：故意展示不完整的能力，让对手误判桎梏所在

# ============================================================
# 战斗心理描写规则
# 核心原则：JOJO式战斗 = 心理战。没有心理描写的战斗是空壳。
# ============================================================

battle_psychology:
  core_principle: "战斗篇幅中，心理描写至少占五成。动作是心理判断的外化，砍掉心理只剩皮囊"

  mandatory_elements:
    - name: "推理链"
      description: |
        主角的推理过程是战斗的脊柱。写法：
        - 分步展开，每步之间夹一次动作。不要一口气给完。
        - 用疑问句推进——"为什么？""不对——""等等。"
        - 允许3-5句连续内心推理（战斗场景特有豁免，日常禁止）
      example: |
        他每次攻击后都后退一步。
        不是因为体力不支——刚才那三招的力道没有递减。
        那为什么退？
        ……在拉距离。他在确保自己始终站在某个范围之外。
        什么范围？
    - name: "误判-修正循环"
      description: |
        每场重要战斗，主角至少有一次误判。
        误判 -> 因误判吃亏 -> 新信息进入 -> 推翻原判断 -> 修正 -> 再试
        这个循环可以出现不止一次。每次修正都让读者更深入地理解对手的道痕规则。
        关键：误判时读者也应该跟着错。不能让读者觉得"明明很明显啊"。
    - name: "恐惧与决断并存"
      description: |
        陆沉不是冷血机器。每次关键决断前必须写：
        - 身体的恐惧反应（冷汗、手抖、心跳、呼吸急促——选一个，不堆砌）
        - 理性的计算（"成功率多少""赌不赌"）
        - 最终的决断动作（极短句："赌。"或直接做了。不解释为什么赌。）
        三者缺一不可。只有恐惧没有计算 = 废物。只有计算没有恐惧 = 机器人。
    - name: "对手心理的间接呈现"
      description: |
        限知视角不能直接写对手心理。但可以通过外部细节让读者"读到"：
        - 微表情："他的瞳孔缩了一下""嘴角那点笑凝住了"
        - 身体语言："重心往后压了半寸""握剑的手指松了又紧"
        - 行为变化："他不再主动进攻了""出招的节奏突然变了"
        - 言语泄漏："他多说了一句废话——他在争取时��"
        好的战斗，读者应该能从这些细节里推测出对手在想什么。

  pacing_rule: |
    战斗段落的呼吸节奏：动作-心理-动作-心理，交替进行。
    - 禁止连续3段以上纯动作（没有任何内心活动）
    - 禁止连续5句以上纯推理（中间必须插一个动作或感官细节打断）
    - 关键一击前必须有一拍心理停顿（哪怕只有一个字）
    - 关键一击后必须有一拍身体反馈（痛、脱力、手抖）

  intensity_scale:
    - level: "日常小战（猎妖、训练）"
      psychology_ratio: "三成"
      focus: "只写认知层（观察-判断-行动），不展开博弈层和情感层"
    - level: "重要战斗（考核、敌对势力）"
      psychology_ratio: "五成"
      focus: "认知层+博弈层。必须有误判-修正循环。至少一次恐惧-决断。"
    - level: "卷高潮战斗"
      psychology_ratio: "六成"
      focus: "三层全开。推理链最长、误判最深、情感赌注最高。战后必须有心理余震。"
